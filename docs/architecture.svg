<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .label { font-size: 12px; fill: #1a1a1a; }
      .small { font-size: 10px; fill: #555; }
      .title { font-size: 16px; fill: #1a1a1a; font-weight: 600; }
      .vpc { fill: #f4f8ff; stroke: #2b6cb0; stroke-width: 2; }
      .public { fill: #fff8e6; stroke: #d69e2e; stroke-width: 1.5; }
      .private { fill: #e6f7ee; stroke: #38a169; stroke-width: 1.5; }
      .alb { fill: #ed8936; stroke: #c05621; stroke-width: 1.5; }
      .nat { fill: #4299e1; stroke: #2b6cb0; stroke-width: 1.5; }
      .pod { fill: #fff; stroke: #2b6cb0; stroke-width: 1; }
      .eks { fill: #faf5ff; stroke: #805ad5; stroke-width: 1.5; }
      .ext { fill: #fef5e7; stroke: #ed8936; stroke-width: 1; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a202c"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" class="title">AWS EKS Production Reference — Architecture</text>

  <rect x="40" y="60" width="740" height="450" rx="8" class="vpc"/>
  <text x="55" y="80" class="label" font-weight="600">VPC 10.0.0.0/16 (3 AZs)</text>

  <text x="50" y="105" class="small">Internet</text>
  <line x1="100" y1="100" x2="180" y2="100" class="arrow" stroke="#1a202c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="180" y="85" width="100" height="32" rx="4" class="alb"/>
  <text x="230" y="105" text-anchor="middle" class="label" fill="white">ALB</text>

  <rect x="60" y="150" width="320" height="180" rx="6" class="public"/>
  <text x="220" y="170" text-anchor="middle" class="label" font-weight="600">Public Subnets</text>
  <rect x="80" y="190" width="60" height="36" rx="4" class="nat"/>
  <text x="110" y="212" text-anchor="middle" class="label" fill="white">NAT</text>
  <text x="80" y="252" class="small">10.0.0.0/24, 10.0.1.0/24, 10.0.2.0/24</text>
  <text x="80" y="270" class="small">Tagged: kubernetes.io/role/elb=1</text>
  <text x="80" y="288" class="small">ALB lives here (ALB Controller</text>
  <text x="80" y="304" class="small">picks public subnets via tag).</text>

  <rect x="420" y="150" width="340" height="340" rx="6" class="private"/>
  <text x="590" y="170" text-anchor="middle" class="label" font-weight="600">Private Subnets — EKS workloads</text>
  <text x="430" y="190" class="small">10.0.10–12.0/24 · kubernetes.io/role/internal-elb=1</text>

  <rect x="440" y="210" width="300" height="170" rx="6" class="eks"/>
  <text x="590" y="230" text-anchor="middle" class="label" font-weight="600">EKS Cluster (k8s 1.30)</text>

  <rect x="455" y="245" width="130" height="55" rx="4" class="pod"/>
  <text x="520" y="263" text-anchor="middle" class="label" font-weight="600">hello-world pod</text>
  <text x="520" y="280" text-anchor="middle" class="small">SA → IRSA → IAM Role</text>
  <text x="520" y="294" text-anchor="middle" class="small">CSI mounts secret</text>

  <rect x="600" y="245" width="130" height="55" rx="4" class="pod"/>
  <text x="665" y="263" text-anchor="middle" class="label" font-weight="600">ALB Controller</text>
  <text x="665" y="280" text-anchor="middle" class="small">in kube-system</text>
  <text x="665" y="294" text-anchor="middle" class="small">IRSA → manages ALBs</text>

  <text x="455" y="325" class="small">Managed node group: t3.medium × 2 (autoscale 1–4)</text>
  <text x="455" y="343" class="small">OIDC provider enabled (IRSA)</text>
  <text x="455" y="361" class="small">KMS-encrypted K8s secrets</text>

  <rect x="440" y="400" width="300" height="80" rx="6" class="ext"/>
  <text x="590" y="420" text-anchor="middle" class="label" font-weight="600">AWS Managed Services</text>
  <text x="455" y="440" class="small">• Secrets Manager (KMS-encrypted secret + IAM)</text>
  <text x="455" y="455" class="small">• ECR (immutable, scan-on-push, KMS-encrypted)</text>
  <text x="455" y="470" class="small">• CloudWatch Logs (control-plane audit/api/auth)</text>

  <line x1="280" y1="115" x2="500" y2="245" class="arrow" stroke="#1a202c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="140" y1="208" x2="440" y2="265" class="arrow" stroke="#1a202c" stroke-width="1" fill="none" marker-end="url(#arr)" stroke-dasharray="4,3"/>
</svg>
