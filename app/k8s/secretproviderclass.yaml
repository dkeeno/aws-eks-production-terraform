apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: hello-world-aws-secrets
  namespace: hello-world
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "demo-eks-dev/hello-world/api-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "API_KEY"
            objectAlias: "API_KEY"
  secretObjects:
    - secretName: hello-world-secrets
      type: Opaque
      data:
        - objectName: API_KEY
          key: API_KEY
